server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/cuida_tus_lukas?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Santiago&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Gato8objeto.}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: cuida_tus_lukas
  cache:
    type: simple

# ─── APIs externas ─────────────────────────────────────────────────────────────
app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4201,http://localhost:4200}

  # CMF Chile — regístrate gratis en https://api.cmfchile.cl
  cmf:
    enabled: false
    api-key: ${CMF_API_KEY:}
    base-url: https://api.cmfchile.cl/api-sbifv3/recursos_api

  # WhoisXML — opcional, 500 gratis/mes en https://www.whoisxmlapi.com
  # Si no hay API key, se usa RDAP (público, sin key)
  whois:
    api-key: ${WHOIS_API_KEY:}
    xml-url: https://www.whoisxmlapi.com/whoisserver/WhoisService
    rdap-url: https://rdap.org/domain
    rdap-cl-url: https://rdap.nic.cl/domain

  # Análisis de contenido web — fetch real de la página (agrega ~2-4s)
  # No requiere API key. El RestTemplate usa connect=3s / read=5s por defecto.
  content-analysis:
    enabled: true

  # Google Safe Browsing API — gratis 10.000/día
  # Activar en: https://console.cloud.google.com → "Safe Browsing API"
  google-safe-browsing:
    api-key: ${GOOGLE_SAFE_BROWSING_KEY:}
    url: https://safebrowsing.googleapis.com/v4/threatMatches:find

  # VirusTotal API — gratis 500/día, 4/minuto
  # Registrar en: https://www.virustotal.com/gui/join-us
  virustotal:
    api-key: ${VIRUSTOTAL_API_KEY:}
    base-url: https://www.virustotal.com/api/v3

logging:
  level:
    com.cuidatuslukas: INFO
    org.springframework.web.client: WARN
